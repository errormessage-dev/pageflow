# Pageflow — iOS App Store / TestFlight
#
# Bundle ID (iOS): com.pageflow.mobile
# Android Play package stays: com.pageflow.pageflow
#
# BEFORE THE FIRST BUILD (Codemagic web UI):
# 1. Code signing certificates: Apple Distribution (.p12)
# 2. Provisioning profiles: App Store profile for com.pageflow.mobile
#    (Certificate column must show a green check, not "Not uploaded")
# 3. Integrations → App Store Connect / Developer Portal: API key (.p8)
# 4. Replace PAGELOW_APP_STORE_CONNECT below with that integration name.
# 5. App Store Connect → New App with bundle ID com.pageflow.mobile

workflows:
  ios-app-store:
    name: iOS App Store Build
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: PAGELOW_APP_STORE_CONNECT
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pageflow.mobile
    scripts:
      - name: Install Flutter dependencies
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles --project ios/Runner.xcodeproj
      - name: Build IPA for App Store
        script: |
          flutter build ipa --release \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
