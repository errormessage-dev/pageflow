workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Build IPA for App Store
        script: flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        key_id: 8N64X72923
        issuer_id: 976915f4-7461-42e0-99a2-7a1cf80e016f
        private_key: $AUTH_KEY
    ios_signing:
      distribution_type: app_store
      bundle_identifier: com.pageflow.pdfconverter